<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pringle Padel Scheduler</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a20;
      --muted: #8ea1b2;
      --accent: #4cc9f0;
      --accent-2: #22c55e;
      --error: #ef4444;
      --text: #e8eef5;
      --card: #0b0e13;
      --border: #2a3340;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      background: linear-gradient(180deg, #0b0e13, #0f1115 30%);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,14,19,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 18px 16px; }
    h1 { margin: 0 0 8px; letter-spacing: 0.2px; font-weight: 800; }
    h2, h3 { margin: 0 0 10px; }
    .subtle, .hint, .muted { color: var(--muted); }
    .hint { font-size: 12px; }
    .small { font-size: 12px; }
    .right { text-align: right; }
    .nowrap { white-space: nowrap; }
    .spacer { flex: 1; }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }
    .sr { position: absolute; left: -9999px; }

    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .flex { display: flex; gap: 8px; align-items: center; }
    .grid { display: grid; gap: 14px; }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    select, input[type="number"], input[type="text"], textarea, button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    textarea { width: 100%; min-height: 130px; resize: vertical; }
    button { cursor: pointer; }
    button.primary { background: linear-gradient(180deg, #3b82f6, #2563eb); border-color: #1d4ed8; }
    button.ghost { background: transparent; }
    button.warn { background: linear-gradient(180deg, #f59e0b, #d97706); border-color: #b45309; }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      display: inline-block;
    }

    .pill.ok { color: #bbf7d0; border-color: #14532d; background: rgba(34,197,94,0.08); }
    .pill.warn { color: #fde68a; border-color: #78350f; background: rgba(245,158,11,0.08); }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      background: #0b0e13;
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .kpi { display: flex; gap: 12px; flex-wrap: wrap; }
    .kpi .item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; min-width: 110px; }
    .k { color: var(--muted); font-size: 12px; }
    .v { font-weight: 800; font-size: 20px; }

    .table { width: 100%; border-collapse: collapse; overflow: hidden; }
    .table th, .table td { border-bottom: 1px dashed var(--border); padding: 8px 10px; text-align: left; }
    .table th { color: var(--muted); font-weight: 700; }

    .block { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
    .block > .block-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #0b0e13; border-bottom: 1px solid var(--border); }
    .block .content { padding: 8px 12px; }

    .rowline {
      display: grid;
      grid-template-columns: 110px 1fr 40px 1fr 220px 100px;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px dashed var(--border);
    }

    .rowline:last-child { border-bottom: 0; }
    .rowline > * { min-width: 0; }

    .score { width: 90px; padding: 6px 8px; font-size: 16px; text-align: center; }

    .master-settings { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .master-settings.open { display: grid; }
    .simple-settings { margin-top: 12px; }

    .notice {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(76, 201, 240, 0.08);
      color: var(--text);
      font-size: 13px;
    }

    .notice.warn { background: rgba(245, 158, 11, 0.10); border-color: #78350f; color: #fde68a; }
    .empty { color: var(--muted); border: 1px dashed var(--border); border-radius: 14px; padding: 14px; background: rgba(11, 14, 19, 0.35); }
    .footer { color: var(--muted); font-size: 12px; padding-top: 16px; }

    @media (max-width: 900px) {
      .wrap { padding: 14px 12px; }
      .grid.two { grid-template-columns: 1fr; }
      select, input[type="number"], input[type="text"], textarea, button { width: 100%; }
      h1 { font-size: 20px; line-height: 1.2; }
      .kpi .item { flex: 1 1 45%; }
      .table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .rowline {
        grid-template-columns: 1fr minmax(180px, 1fr);
        grid-template-areas: "court tag" "a a" "vs vs" "b score";
        gap: 6px 10px;
      }
      .rowline > :nth-child(1) { grid-area: court; }
      .rowline > :nth-child(2) { grid-area: a; text-align: left; }
      .rowline > :nth-child(3) { grid-area: vs; text-align: left; }
      .rowline > :nth-child(4) { grid-area: b; text-align: left; }
      .rowline > :nth-child(5) { grid-area: score; justify-self: stretch; width: 100%; }
      .rowline > :nth-child(6) { grid-area: tag; justify-self: end; }
      .rowline .flex { width: 100%; }
      .rowline .score { width: calc(50% - 8px); min-width: 80px; }
      .block .content { padding: 8px; }
      .card { padding: 12px; }
    }

    @media (max-width: 640px) {
      header .row > * { flex: 1 1 160px; }
      #status { flex: 0 0 auto; }
    }

    @media (max-width: 480px) {
      select, input[type="number"], input[type="text"], textarea, button { font-size: 16px; }
      .nowrap { white-space: normal; }
      .rowline .muted.small { font-size: 11px; }
      header h1 { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Pringle Padel Scheduler</h1>
      <div class="row">
        <label>
          <span class="sr">Mode</span>
          <select id="mode">
            <option value="americano">Individual Americano</option>
            <option value="roundrobin">Teams Round Robin</option>
          </select>
        </label>
        <button id="btn-new" class="warn" type="button">New Event</button>
        <div class="spacer"></div>
        <span id="status" class="pill">Idle</span>
      </div>
    </div>
  </header>

  <main class="wrap grid" style="padding-top:16px;">
    <section class="card" id="config">
      <h2>Configuration</h2>

      <div id="cfg-americano" class="grid two">
        <div>
          <label class="small">Player Names</label>
          <textarea id="players" placeholder="Player 1&#10;Player 2&#10;Player 3 ..."></textarea>
        </div>
        <div>
          <div class="grid two simple-settings">
            <label>Courts
              <input id="numCourtsA" type="number" min="1" step="1" value="2" />
            </label>
          </div>
          <div id="master-americano" class="grid two master-settings">
            <label>Auto Player Count
              <input id="numPlayers" type="number" min="4" step="1" value="8" />
            </label>
            <label>Time Cap (min)
              <input id="timeCapA" type="number" min="1" step="1" value="12" />
            </label>
            <label>Changeover (min)
              <input id="bufferA" type="number" min="0" step="1" value="3" />
            </label>
            <label>Total Event (min)
              <input id="totalEventA" type="number" min="10" step="5" value="120" />
            </label>
            <label>Max Points
              <input id="maxPointsA" type="number" min="0" step="1" value="12" />
            </label>
          </div>
        </div>
      </div>

      <div id="cfg-rr" class="grid two" style="display:none;">
        <div>
          <label class="small">Team Names</label>
          <textarea id="teams" placeholder="Team 1&#10;Team 2&#10;Team 3 ..."></textarea>
        </div>
        <div>
          <div class="grid two simple-settings">
            <label>Courts
              <input id="numCourtsT" type="number" min="1" step="1" value="3" />
            </label>
          </div>
          <div id="master-rr" class="grid two master-settings">
            <label>Auto Team Count
              <input id="numTeams" type="number" min="2" step="1" value="8" />
            </label>
            <label>Time Cap (min)
              <input id="timeCapT" type="number" min="1" step="1" value="10" />
            </label>
            <label>Changeover (min)
              <input id="bufferT" type="number" min="0" step="1" value="2" />
            </label>
            <label>Max Points
              <input id="maxPointsT" type="number" min="0" step="1" placeholder="Leave empty for free entry" />
            </label>
          </div>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <button id="btn-build" class="primary" type="button">Build Schedule</button>
        <button id="btn-clear-scores" class="ghost" type="button">Clear Scores</button>
        <button id="btn-master" class="ghost" type="button">Show Master Settings</button>
        <span class="hint">Basic Americano builds a mathematically balanced rotation. Scores reset when a new schedule is built.</span>
      </div>
      <div id="scheduleNotice" class="notice" style="display:none;"></div>
    </section>

    <section class="card" id="summary">
      <h2>Summary</h2>
      <div class="kpi" id="kpis"></div>
      <div class="divider"></div>
      <div class="hint" id="timingHint"></div>
    </section>

    <section class="card">
      <h2>Fixtures & Results</h2>
      <div id="fixtures"></div>
    </section>

    <section class="card">
      <h2>Standings</h2>
      <table class="table" id="table"></table>
      <div class="footer">Sorted by Points, Wins, Draws, Losses, Name.</div>
    </section>
  </main>

  <script>
    const $ = (s, r = document) => r.querySelector(s);
    const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
    const STORE_KEY = 'pringle-padel-scheduler-v3-fixed';

    const state = {
      mode: 'americano',
      players: [],
      schedule: [],
      target: 0,
      resultsA: {},
      teams: [],
      matches: [],
      blocks: [],
      resultsT: {},
      scheduleNote: '',
      masterOpen: false,
      cfg: {
        timeCapA: 12,
        bufferA: 3,
        totalEventA: 120,
        maxPointsA: 12,
        numCourtsA: 2,
        numPlayers: 8,
        timeCapT: 10,
        bufferT: 2,
        maxPointsT: null,
        numCourtsT: 3,
        numTeams: 8
      }
    };

    function fmtMM(mins) {
      mins = Math.round(mins || 0);
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return h ? `${h}h ${String(m).padStart(2, '0')}m` : `${m}m`;
    }

    function saveState(partial = {}) {
      const existing = loadState();
      const saved = { ...existing, ...partial, ts: Date.now() };
      localStorage.setItem(STORE_KEY, JSON.stringify(saved));
      setStatus('Saved');
    }

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
      catch { return {}; }
    }

    function clearState() { localStorage.removeItem(STORE_KEY); }

    function setStatus(text) {
      $('#status').textContent = text;
      if (text !== 'Idle') {
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => $('#status').textContent = 'Idle', 900);
      }
    }

    function asInt(sel, fallback = 0) {
      const n = parseInt($(sel).value || String(fallback), 10);
      return Number.isFinite(n) ? Math.max(0, n) : fallback;
    }

    function valInt(v) {
      const n = parseInt(v, 10);
      return Number.isFinite(n) ? n : 0;
    }

    function readOptionalNumber(sel) {
      const v = $(sel).value.trim();
      if (v === '') return null;
      const n = parseInt(v, 10);
      return Number.isFinite(n) ? Math.max(0, n) : null;
    }

    function groupBy(arr, fn) {
      return arr.reduce((acc, x) => {
        const k = fn(x);
        (acc[k] = acc[k] || []).push(x);
        return acc;
      }, {});
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function byName(a, b) { return a.localeCompare(b); }

    function slotLenA(cfg) { return (cfg.timeCapA || 0) + (cfg.bufferA || 0); }

    function totalBlocksA(cfg) {
      const slot = slotLenA(cfg);
      return slot > 0 ? Math.floor((cfg.totalEventA || 0) / slot) : 0;
    }

    function genPlayers() {
      const raw = ($('#players').value || '').split(/\n+/).map(s => s.trim()).filter(Boolean);
      if (raw.length) return [...raw];
      const n = Math.max(4, asInt('#numPlayers', 8));
      return Array.from({ length: n }, (_, i) => `Player ${i + 1}`);
    }

    function genTeams() {
      const raw = ($('#teams').value || '').split(/\n+/).map(s => s.trim()).filter(Boolean);
      if (raw.length) return [...raw];
      const n = Math.max(2, asInt('#numTeams', 8));
      return Array.from({ length: n }, (_, i) => `Team ${i + 1}`);
    }

    function buildIndividualAmericano(players, nCourts, roundLimit = null) {
      const cleanPlayers = [...players];

      if (cleanPlayers.length < 4 || nCourts < 1) {
        return { schedule: [], target: 0, note: 'Not enough players or courts to build a schedule.' };
      }

      const playerCount = cleanPlayers.length;
      const pairKey = (a, b) => [a, b].sort().join('|||');
      const groupKey = players4 => [...players4].sort().join('|||');

      function allPossibleMatches() {
        const candidates = [];
        for (let a = 0; a < playerCount - 3; a++) {
          for (let b = a + 1; b < playerCount - 2; b++) {
            for (let c = b + 1; c < playerCount - 1; c++) {
              for (let d = c + 1; d < playerCount; d++) {
                const p = [cleanPlayers[a], cleanPlayers[b], cleanPlayers[c], cleanPlayers[d]];
                candidates.push({ A: [p[0], p[1]], B: [p[2], p[3]], players: p });
                candidates.push({ A: [p[0], p[2]], B: [p[1], p[3]], players: p });
                candidates.push({ A: [p[0], p[3]], B: [p[1], p[2]], players: p });
              }
            }
          }
        }
        return candidates;
      }

      const candidates = allPossibleMatches();
      const maximumUniquePartnerTarget = playerCount - 1;
      const maximumRounds = roundLimit == null ? Number.POSITIVE_INFINITY : Math.max(0, roundLimit);
      const matchCapacity = Number.isFinite(maximumRounds) ? maximumRounds * nCourts : Number.POSITIVE_INFINITY;

      function validTarget(target) {
        if (target < 1) return false;
        const appearances = playerCount * target;
        if (appearances % 4 !== 0) return false;
        const matchesNeeded = appearances / 4;
        if (matchesNeeded > matchCapacity) return false;
        const minimumRounds = Math.ceil(matchesNeeded / Math.max(1, Math.min(nCourts, Math.floor(playerCount / 4))));
        return minimumRounds <= maximumRounds;
      }

      let target = maximumUniquePartnerTarget;
      while (target > 0 && !validTarget(target)) target--;

      if (target < 1) {
        return {
          schedule: [],
          target: 0,
          note: 'The selected time and court limits cannot give every player the same number of Americano matches.'
        };
      }

      const matchesNeeded = (playerCount * target) / 4;
      const maxAttempts = 3000;
      let bestSchedule = null;

      for (let attempt = 0; attempt < maxAttempts && !bestSchedule; attempt++) {
        const counts = Object.fromEntries(cleanPlayers.map(p => [p, 0]));
        const partnerCounts = new Map();
        const opponentCounts = new Map();
        const groupCounts = new Map();
        const schedule = [];
        let block = 1;
        let court = 1;
        let usedThisRound = new Set();
        let failed = false;

        function pairCount(map, a, b) { return map.get(pairKey(a, b)) || 0; }
        function addPair(map, a, b) {
          const key = pairKey(a, b);
          map.set(key, (map.get(key) || 0) + 1);
        }

        while (schedule.length < matchesNeeded && !failed) {
          const remainingMatches = matchesNeeded - schedule.length;
          const requireUniquePartners = attempt < Math.floor(maxAttempts * 0.85);
          const available = candidates.filter(m => {
            if (m.players.some(p => counts[p] >= target || usedThisRound.has(p))) return false;
            if (requireUniquePartners && (
              pairCount(partnerCounts, m.A[0], m.A[1]) > 0 ||
              pairCount(partnerCounts, m.B[0], m.B[1]) > 0
            )) return false;
            const totalDeficit = m.players.reduce((sum, p) => sum + (target - counts[p]), 0);
            return totalDeficit > 0;
          });

          if (!available.length) {
            if (court > 1) {
              block++;
              court = 1;
              usedThisRound = new Set();
              if (block > maximumRounds) failed = true;
              continue;
            }
            failed = true;
            break;
          }

          const scored = available.map(m => {
            const deficits = m.players.map(p => target - counts[p]);
            const minDeficit = Math.min(...deficits);
            const totalDeficit = deficits.reduce((a, b) => a + b, 0);
            const spread = Math.max(...m.players.map(p => counts[p])) - Math.min(...m.players.map(p => counts[p]));
            const partnerRepeats = pairCount(partnerCounts, m.A[0], m.A[1]) + pairCount(partnerCounts, m.B[0], m.B[1]);
            let opponentRepeats = 0;
            for (const a of m.A) for (const b of m.B) opponentRepeats += pairCount(opponentCounts, a, b);
            const sameGroup = groupCounts.get(groupKey(m.players)) || 0;
            const completionBonus = m.players.filter(p => counts[p] + 1 === target).length;
            const randomNoise = Math.random() * 4;

            const score =
              minDeficit * 1000 +
              totalDeficit * 100 -
              spread * 80 -
              partnerRepeats * 500 -
              opponentRepeats * 18 -
              sameGroup * 35 +
              completionBonus * 30 +
              randomNoise;

            return { m, score };
          }).sort((x, y) => y.score - x.score);

          const choicePool = scored.slice(0, Math.min(8, scored.length));
          const chosen = choicePool[Math.floor(Math.random() * choicePool.length)].m;

          schedule.push({
            block,
            court,
            A: [...chosen.A],
            B: [...chosen.B],
            is_counted: true,
            match_id: schedule.length + 1
          });

          chosen.players.forEach(p => {
            counts[p]++;
            usedThisRound.add(p);
          });
          addPair(partnerCounts, chosen.A[0], chosen.A[1]);
          addPair(partnerCounts, chosen.B[0], chosen.B[1]);
          for (const a of chosen.A) for (const b of chosen.B) addPair(opponentCounts, a, b);
          const gk = groupKey(chosen.players);
          groupCounts.set(gk, (groupCounts.get(gk) || 0) + 1);

          court++;
          const usableCourts = Math.min(nCourts, Math.floor(playerCount / 4));
          if (court > usableCourts || schedule.length === matchesNeeded) {
            block++;
            court = 1;
            usedThisRound = new Set();
          }

          if (Number.isFinite(maximumRounds) && block > maximumRounds + 1 && schedule.length < matchesNeeded) failed = true;
          if (remainingMatches > 0 && schedule.length > matchesNeeded) failed = true;
        }

        const balanced = cleanPlayers.every(p => counts[p] === target);
        const roundsUsed = schedule.length ? Math.max(...schedule.map(m => m.block)) : 0;
        if (!failed && balanced && schedule.length === matchesNeeded && roundsUsed <= maximumRounds) {
          bestSchedule = schedule;
        }
      }

      if (!bestSchedule) {
        return {
          schedule: [],
          target: 0,
          note: 'A balanced Americano schedule could not be produced with these limits. Add more rounds or courts.'
        };
      }

      const roundsUsed = Math.max(...bestSchedule.map(m => m.block));
      let note = `Balanced Americano built: every player plays ${target} matches across ${roundsUsed} rounds.`;
      if (target < maximumUniquePartnerTarget) {
        note += ` The schedule stops at ${target} matches per player because ${maximumUniquePartnerTarget} each is not mathematically divisible into four-player matches.`;
      }
      if (roundLimit != null && roundsUsed < roundLimit) note += ' Unneeded time rounds were left empty rather than giving players unequal match totals.';

      return { schedule: bestSchedule, target, note };
    }

    function allRRMatches(teams) {
      const matches = [];
      for (let i = 0; i < teams.length; i++) {
        for (let j = i + 1; j < teams.length; j++) matches.push([teams[i], teams[j]]);
      }
      return shuffle(matches);
    }

    function buildBlocks(matches, numCourts) {
      const remaining = [...matches];
      const playedCount = {};
      const countTeam = t => playedCount[t] || 0;
      function inc(a, b) {
        playedCount[a] = (playedCount[a] || 0) + 1;
        playedCount[b] = (playedCount[b] || 0) + 1;
      }
      const blocks = [];
      while (remaining.length) {
        const block = [];
        const used = new Set();
        remaining.sort((m1, m2) => (countTeam(m1[0]) + countTeam(m1[1])) - (countTeam(m2[0]) + countTeam(m2[1])));
        for (const [a, b] of remaining) {
          if (block.length >= numCourts) break;
          if (!used.has(a) && !used.has(b)) {
            block.push([a, b]);
            used.add(a);
            used.add(b);
          }
        }
        if (!block.length) break;
        block.forEach(([a, b]) => {
          inc(a, b);
          const idx = remaining.findIndex(x => (x[0] === a && x[1] === b) || (x[0] === b && x[1] === a));
          if (idx > -1) remaining.splice(idx, 1);
        });
        blocks.push(block);
      }
      return blocks;
    }

    function keyFor(a, b) { return JSON.stringify([a, b].sort()); }

    function orientScore(a, b, arr) {
      const [x] = JSON.parse(keyFor(a, b));
      return a === x ? arr : [arr[1], arr[0]];
    }

    function computeAmericanoTable(players, schedule, results) {
      const table = Object.fromEntries(players.map(p => [p, { played: 0, points_for: 0, wins: 0, draws: 0, losses: 0 }]));
      for (const m of schedule) {
        if (!m.is_counted || !results[m.match_id]) continue;
        const [pa, pb] = results[m.match_id];
        const [a1, a2] = m.A;
        const [b1, b2] = m.B;
        [a1, a2, b1, b2].forEach(p => table[p].played++);
        table[a1].points_for += pa;
        table[a2].points_for += pa;
        table[b1].points_for += pb;
        table[b2].points_for += pb;
        if (pa > pb) {
          table[a1].wins++;
          table[a2].wins++;
          table[b1].losses++;
          table[b2].losses++;
        } else if (pb > pa) {
          table[b1].wins++;
          table[b2].wins++;
          table[a1].losses++;
          table[a2].losses++;
        } else {
          table[a1].draws++;
          table[a2].draws++;
          table[b1].draws++;
          table[b2].draws++;
        }
      }
      return table;
    }

    function computeRRTable(teams, matches, results) {
      const table = Object.fromEntries(teams.map(t => [t, { played: 0, points_for: 0, wins: 0, draws: 0, losses: 0 }]));
      for (const [a, b] of matches) {
        const key = keyFor(a, b);
        if (!results[key]) continue;
        const [pa, pb] = orientScore(a, b, results[key]);
        table[a].played++;
        table[b].played++;
        table[a].points_for += pa;
        table[b].points_for += pb;
        if (pa > pb) { table[a].wins++; table[b].losses++; }
        else if (pb > pa) { table[b].wins++; table[a].losses++; }
        else { table[a].draws++; table[b].draws++; }
      }
      return table;
    }

    function orderTable(entries) {
      return entries.sort((A, B) => {
        const a = A[1];
        const b = B[1];
        return (b.points_for - a.points_for) || (b.wins - a.wins) || (b.draws - a.draws) || (a.losses - b.losses) || byName(A[0], B[0]);
      });
    }

    function collectCurrentCfgNoSave() {
      state.cfg.timeCapA = asInt('#timeCapA', 12);
      state.cfg.bufferA = asInt('#bufferA', 3);
      state.cfg.totalEventA = asInt('#totalEventA', 120);
      state.cfg.maxPointsA = readOptionalNumber('#maxPointsA');
      state.cfg.numCourtsA = Math.max(1, asInt('#numCourtsA', 2));
      state.cfg.numPlayers = Math.max(4, asInt('#numPlayers', 8));
      state.cfg.timeCapT = asInt('#timeCapT', 10);
      state.cfg.bufferT = asInt('#bufferT', 2);
      state.cfg.maxPointsT = readOptionalNumber('#maxPointsT');
      state.cfg.numCourtsT = Math.max(1, asInt('#numCourtsT', 3));
      state.cfg.numTeams = Math.max(2, asInt('#numTeams', 8));
    }

    function collectAndSaveCfg() {
      collectCurrentCfgNoSave();
      const players = ($('#players').value || '').split(/\n+/).map(s => s.trim()).filter(Boolean);
      const teams = ($('#teams').value || '').split(/\n+/).map(s => s.trim()).filter(Boolean);
      saveState({ cfg: state.cfg, players, teams, masterOpen: state.masterOpen, mode: state.mode });
    }

    function buildSchedule() {
      state.mode = $('#mode').value;
      collectCurrentCfgNoSave();
      state.scheduleNote = '';

      if (state.mode === 'americano') {
        const players = genPlayers();
        const roundLimit = state.masterOpen ? totalBlocksA(state.cfg) : null;
        const result = buildIndividualAmericano(players, state.cfg.numCourtsA, roundLimit);

        state.players = players;
        state.schedule = result.schedule;
        state.target = result.target;
        state.resultsA = {};
        state.scheduleNote = result.note;

        saveState({ mode: state.mode, players: state.players, schedule: state.schedule, target: state.target, resultsA: {}, scheduleNote: state.scheduleNote, cfg: state.cfg, masterOpen: state.masterOpen });
      } else {
        const teams = genTeams();
        const matches = allRRMatches(teams);
        const blocks = buildBlocks(matches, state.cfg.numCourtsT);

        state.teams = teams;
        state.matches = matches;
        state.blocks = blocks;
        state.resultsT = {};
        state.scheduleNote = 'Schedule built. Scores were reset.';

        saveState({ mode: state.mode, teams: state.teams, matches: state.matches, blocks: state.blocks, resultsT: {}, scheduleNote: state.scheduleNote, cfg: state.cfg, masterOpen: state.masterOpen });
      }

      renderAll();
    }

    function updateMasterSettingsUI() {
      $('#master-americano').classList.toggle('open', state.masterOpen && state.mode === 'americano');
      $('#master-rr').classList.toggle('open', state.masterOpen && state.mode === 'roundrobin');
      $('#btn-master').textContent = state.masterOpen ? 'Hide Master Settings' : 'Show Master Settings';
    }

    function toggleModePanels() {
      state.mode = $('#mode').value;
      $('#cfg-americano').style.display = state.mode === 'americano' ? '' : 'none';
      $('#cfg-rr').style.display = state.mode === 'roundrobin' ? '' : 'none';
      updateMasterSettingsUI();
    }

    function renderAll() { renderSummary(); renderFixtures(); renderTable(); }

    function renderSummary() {
      const k = $('#kpis');
      const notice = $('#scheduleNotice');
      k.innerHTML = '';

      if (state.scheduleNote) {
        notice.style.display = '';
        notice.className = /Not enough|Odd player|Not enough courts/i.test(state.scheduleNote) ? 'notice warn' : 'notice';
        notice.textContent = state.scheduleNote;
      } else {
        notice.style.display = 'none';
        notice.textContent = '';
      }

      if (state.mode === 'americano') {
        const roundsUsed = state.schedule.length ? Math.max(...state.schedule.map(m => m.block)) : 0;
        k.appendChild(kpi('Players', state.players.length));
        k.appendChild(kpi('Courts', state.cfg.numCourtsA));
        k.appendChild(kpi('Rounds', roundsUsed));
        k.appendChild(kpi('Matches', state.schedule.length));
        if (state.masterOpen) {
          const blocks = totalBlocksA(state.cfg);
          const slot = slotLenA(state.cfg);
          k.appendChild(kpi('Time Rounds', blocks));
          k.appendChild(kpi('Target/Player', state.target));
          k.appendChild(kpi('Slot', `${slot} min`));
          k.appendChild(kpi('Budget', fmtMM(state.cfg.totalEventA || 0)));
        }
        $('#timingHint').textContent = state.masterOpen ? 'Master settings shown. Americano is time-limited.' : 'Basic Americano ignores time and gives every player the same number of matches.';
      } else {
        const slot = (state.cfg.timeCapT || 0) + (state.cfg.bufferT || 0);
        k.appendChild(kpi('Teams', state.teams.length));
        k.appendChild(kpi('Courts', state.cfg.numCourtsT));
        k.appendChild(kpi('Rounds', state.blocks.length));
        k.appendChild(kpi('Matches', state.matches.length));
        if (state.masterOpen) {
          k.appendChild(kpi('Slot', slot ? `${slot} min` : '—'));
          k.appendChild(kpi('Total', slot ? fmtMM(state.blocks.length * slot) : '—'));
        }
        $('#timingHint').textContent = 'Round Robin creates every team matchup once.';
      }
    }

    function kpi(label, value) {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `<div class="k">${escapeHtml(label)}</div><div class="v">${escapeHtml(String(value))}</div>`;
      return el;
    }

    function renderFixtures() {
      const root = $('#fixtures');
      root.innerHTML = '';

      if (state.mode === 'americano') {
        if (!state.schedule.length) {
          root.innerHTML = '<div class="empty">No Americano fixtures yet. Add players and click Build Schedule.</div>';
          return;
        }
        const byBlock = groupBy(state.schedule, m => m.block);
        Object.keys(byBlock).sort((a, b) => a - b).forEach(blockNo => {
          const block = document.createElement('div');
          block.className = 'block';
          block.innerHTML = `<div class="block-header"><div>Round ${blockNo}</div><div class="tag">${state.cfg.maxPointsA == null ? 'Free entry' : 'Max ' + state.cfg.maxPointsA}</div></div>`;
          const content = document.createElement('div');
          content.className = 'content';
          byBlock[blockNo].sort((x, y) => x.court - y.court).forEach(m => content.appendChild(matchRowA(m)));
          block.appendChild(content);
          root.appendChild(block);
        });
      } else {
        if (!state.blocks.length) {
          root.innerHTML = '<div class="empty">No Round Robin fixtures yet. Add teams and click Build Schedule.</div>';
          return;
        }
        state.blocks.forEach((blk, idx) => {
          const block = document.createElement('div');
          block.className = 'block';
          block.innerHTML = `<div class="block-header"><div>Round ${idx + 1}</div><div class="tag">${state.cfg.maxPointsT == null ? 'Free entry' : 'Max ' + state.cfg.maxPointsT}</div></div>`;
          const content = document.createElement('div');
          content.className = 'content';
          blk.forEach((pair, ci) => content.appendChild(matchRowT(ci, pair)));
          block.appendChild(content);
          root.appendChild(block);
        });
      }
    }

    function matchRowA(m) {
      const el = document.createElement('div');
      el.className = 'rowline';
      const [pa, pb] = state.resultsA[m.match_id] || ['', ''];
      const mp = state.cfg.maxPointsA;
      el.innerHTML = `
        <div class="muted">Court ${m.court}</div>
        <div class="right">${escapeHtml(m.A[0])} &amp; ${escapeHtml(m.A[1])}</div>
        <div class="muted small nowrap">vs</div>
        <div>${escapeHtml(m.B[0])} &amp; ${escapeHtml(m.B[1])}</div>
        <div class="flex"><input class="score" type="number" min="0" step="1" placeholder="A" value="${pa}" /><span class="muted">-</span><input class="score" type="number" min="0" step="1" placeholder="B" value="${pb}" /></div>
        <div class="right"><span class="pill ok">COUNTING</span></div>
      `;
      const [aIn, bIn] = el.querySelectorAll('input');

      function persist() {
        const A = aIn.value === '' ? '' : valInt(aIn.value);
        const B = bIn.value === '' ? '' : valInt(bIn.value);
        if (A === '' || B === '') delete state.resultsA[m.match_id];
        else state.resultsA[m.match_id] = [A, B];
        saveState({ resultsA: state.resultsA });
      }

      function onChange() {
        let A = valInt(aIn.value);
        let B = valInt(bIn.value);
        if (mp != null) {
          if (aIn === document.activeElement && aIn.value !== '' && bIn.value === '') { B = mp - A; bIn.value = String(B); }
          if (bIn === document.activeElement && bIn.value !== '' && aIn.value === '') { A = mp - B; aIn.value = String(A); }
        }
        persist();
        renderTable();
      }

      aIn.addEventListener('input', onChange);
      bIn.addEventListener('input', onChange);
      aIn.addEventListener('change', onChange);
      bIn.addEventListener('change', onChange);
      return el;
    }

    function matchRowT(courtIndex, pair) {
      const [Ateam, Bteam] = pair;
      const el = document.createElement('div');
      el.className = 'rowline';
      const key = keyFor(Ateam, Bteam);
      const mp = state.cfg.maxPointsT;
      const [pa, pb] = orientScore(Ateam, Bteam, state.resultsT[key] || ['', '']);
      el.innerHTML = `
        <div class="muted">Court ${courtIndex + 1}</div>
        <div class="right">${escapeHtml(Ateam)}</div>
        <div class="muted small nowrap">vs</div>
        <div>${escapeHtml(Bteam)}</div>
        <div class="flex"><input class="score" type="number" min="0" step="1" placeholder="A" value="${pa}" /><span class="muted">-</span><input class="score" type="number" min="0" step="1" placeholder="B" value="${pb}" /></div>
        <div class="right"><button class="ghost small" type="button">Draw</button></div>
      `;
      const [aIn, bIn] = el.querySelectorAll('input');
      const drawBtn = el.querySelector('button');

      function persist() {
        const Aval = aIn.value === '' ? '' : valInt(aIn.value);
        const Bval = bIn.value === '' ? '' : valInt(bIn.value);
        if (Aval === '' || Bval === '') delete state.resultsT[key];
        else {
          const [x] = JSON.parse(key);
          state.resultsT[key] = Ateam === x ? [Aval, Bval] : [Bval, Aval];
        }
        saveState({ resultsT: state.resultsT });
      }

      function onChange() {
        let A = valInt(aIn.value);
        let B = valInt(bIn.value);
        if (mp != null) {
          if (aIn === document.activeElement && aIn.value !== '' && bIn.value === '') { B = mp - A; bIn.value = String(B); }
          if (bIn === document.activeElement && bIn.value !== '' && aIn.value === '') { A = mp - B; aIn.value = String(A); }
        }
        persist();
        renderTable();
      }

      drawBtn.addEventListener('click', () => {
        if (mp != null && mp % 2 === 0) { aIn.value = String(mp / 2); bIn.value = String(mp / 2); }
        else { aIn.value = '0'; bIn.value = '0'; }
        persist();
        renderTable();
      });

      aIn.addEventListener('input', onChange);
      bIn.addEventListener('input', onChange);
      aIn.addEventListener('change', onChange);
      bIn.addEventListener('change', onChange);
      return el;
    }

    function renderTable() {
      const tbl = $('#table');
      if (state.mode === 'americano') {
        if (!state.players.length) { tbl.innerHTML = '<tr><td class="muted">No players yet.</td></tr>'; return; }
        const table = computeAmericanoTable(state.players, state.schedule, state.resultsA);
        const rows = orderTable(Object.entries(table));
        tbl.innerHTML = `<tr><th>Player</th><th class="right">P</th><th class="right">Pts</th><th class="right">W</th><th class="right">D</th><th class="right">L</th></tr>${rows.map(([name, r]) => `<tr><td>${escapeHtml(name)}</td><td class="right">${r.played}</td><td class="right">${r.points_for}</td><td class="right">${r.wins}</td><td class="right">${r.draws}</td><td class="right">${r.losses}</td></tr>`).join('')}`;
      } else {
        if (!state.teams.length) { tbl.innerHTML = '<tr><td class="muted">No teams yet.</td></tr>'; return; }
        const table = computeRRTable(state.teams, state.matches, state.resultsT);
        const rows = orderTable(Object.entries(table));
        tbl.innerHTML = `<tr><th>Team</th><th class="right">P</th><th class="right">Pts</th><th class="right">W</th><th class="right">D</th><th class="right">L</th></tr>${rows.map(([name, r]) => `<tr><td>${escapeHtml(name)}</td><td class="right">${r.played}</td><td class="right">${r.points_for}</td><td class="right">${r.wins}</td><td class="right">${r.draws}</td><td class="right">${r.losses}</td></tr>`).join('')}`;
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function applyLoaded(loaded) {
      if (!loaded || !Object.keys(loaded).length) {
        $('#mode').value = state.mode;
        toggleModePanels();
        renderAll();
        return;
      }
      Object.assign(state, loaded);
      state.cfg = { ...state.cfg, ...(loaded.cfg || {}) };
      state.scheduleNote = state.scheduleNote || '';
      state.masterOpen = !!state.masterOpen;
      state.resultsA = state.resultsA || {};
      state.resultsT = state.resultsT || {};
      state.players = state.players || [];
      state.teams = state.teams || [];
      state.schedule = state.schedule || [];
      state.matches = state.matches || [];
      state.blocks = state.blocks || [];
      $('#mode').value = state.mode || 'americano';
      $('#players').value = (state.players || []).join('\n');
      $('#teams').value = (state.teams || []).join('\n');
      $('#numPlayers').value = state.cfg.numPlayers ?? 8;
      $('#numCourtsA').value = state.cfg.numCourtsA ?? 2;
      $('#timeCapA').value = state.cfg.timeCapA ?? 12;
      $('#bufferA').value = state.cfg.bufferA ?? 3;
      $('#totalEventA').value = state.cfg.totalEventA ?? 120;
      $('#maxPointsA').value = state.cfg.maxPointsA ?? 12;
      $('#numTeams').value = state.cfg.numTeams ?? 8;
      $('#numCourtsT').value = state.cfg.numCourtsT ?? 3;
      $('#timeCapT').value = state.cfg.timeCapT ?? 10;
      $('#bufferT').value = state.cfg.bufferT ?? 2;
      $('#maxPointsT').value = state.cfg.maxPointsT ?? '';
      toggleModePanels();
      renderAll();
    }

    $('#mode').addEventListener('change', () => {
      state.mode = $('#mode').value;
      toggleModePanels();
      saveState({ mode: state.mode, masterOpen: state.masterOpen });
      renderAll();
    });

    $('#btn-build').addEventListener('click', buildSchedule);

    $('#btn-clear-scores').addEventListener('click', () => {
      if (state.mode === 'americano') { state.resultsA = {}; saveState({ resultsA: {} }); }
      else { state.resultsT = {}; saveState({ resultsT: {} }); }
      renderTable();
    });

    $('#btn-master').addEventListener('click', () => {
      state.masterOpen = !state.masterOpen;
      saveState({ masterOpen: state.masterOpen });
      updateMasterSettingsUI();
      renderSummary();
    });

    $('#btn-new').addEventListener('click', () => {
      if (confirm('Start a brand new event? This clears names, fixtures, scores and standings.')) {
        clearState();
        location.reload();
      }
    });

    $$('#config input, #config textarea').forEach(el => {
      el.addEventListener('change', collectAndSaveCfg);
      el.addEventListener('input', collectAndSaveCfg);
    });

    applyLoaded(loadState());
  </script>
</body>
</html>
